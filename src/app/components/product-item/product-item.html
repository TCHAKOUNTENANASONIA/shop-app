<div class="card" (click)="onProductClick()">
    <img [src]="product().imageUrl" alt="{{ product().name }}">
    <div class="card-body">
        <h3><strong>{{ product().name | uppercase }}</strong></h3>
        
        <p class="price">{{ product().soldPrice }} FCFA</p>
        


        <button class="btn-commander">Commander</button>
    </div>
</div>
